<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincere 3D Apology</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; bottom: 10%; width: 100%; text-align: center;
            opacity: 0; transition: opacity 2s; pointer-events: none;
            z-index: 10;
        }
        .show-ui { opacity: 1 !important; pointer-events: auto !important; }
        #noBtn { transition: all 0.1s ease; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="bg-white/10 backdrop-blur-xl border border-white/20 p-8 rounded-[3rem] inline-block shadow-2xl">
            <h1 class="text-white text-3xl font-bold mb-2">I am truly sorry.</h1>
            <p class="text-gray-400 mb-6">I've been feeling terrible. Can we talk?</p>
            <div class="flex gap-4 justify-center relative">
                <button onclick="accept()" class="bg-white text-black px-10 py-3 rounded-2xl font-bold hover:bg-rose-500 hover:text-white transition-all">Forgive Me</button>
                <button id="noBtn" onmouseover="dodge()" class="border border-white/30 text-white px-8 py-3 rounded-2xl">No</button>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, clock;
        let bodyGroup, head, torso, thighL, thighR, shinL, shinR, armL, armR, bouquet;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 5);
            clock = new THREE.Clock();

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambient);

            const spot = new THREE.SpotLight(0xffffff, 1.2);
            spot.position.set(2, 5, 5);
            spot.castShadow = true;
            scene.add(spot);

            // Floor
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(20, 20),
                new THREE.MeshStandardMaterial({ color: 0x111111 })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // CHARACTER SYSTEM
            bodyGroup = new THREE.Group();
            scene.add(bodyGroup);

            // 1. Torso
            const torsoGeo = new THREE.CapsuleGeometry(0.35, 0.6, 10, 20);
            const torsoMat = new THREE.MeshStandardMaterial({ color: 0x334155 });
            torso = new THREE.Mesh(torsoGeo, torsoMat);
            torso.position.y = 1.6;
            torso.castShadow = true;
            bodyGroup.add(torso);

            // 2. Head
            head = new THREE.Group();
            const face = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
            const hair = new THREE.Mesh(new THREE.SphereGeometry(0.31, 32, 32, 0, Math.PI * 2, 0, Math.PI / 2), new THREE.MeshStandardMaterial({ color: 0x4e342e }));
            hair.position.y = 0.05;
            
            // Specs
            const specGeo = new THREE.TorusGeometry(0.08, 0.01, 8, 20);
            const specMat = new THREE.MeshStandardMaterial({color: 0x000000});
            const sL = new THREE.Mesh(specGeo, specMat); sL.position.set(-0.12, 0, 0.28);
            const sR = new THREE.Mesh(specGeo, specMat); sR.position.set(0.12, 0, 0.28);
            
            head.add(face, hair, sL, sR);
            head.position.y = 0.6;
            torso.add(head);

            // 3. Arms
            const armGeo = new THREE.CapsuleGeometry(0.06, 0.4, 4, 8);
            const armMat = new THREE.MeshStandardMaterial({ color: 0xffdbac });
            armL = new THREE.Mesh(armGeo, armMat); armL.position.set(-0.45, 0.2, 0);
            armR = new THREE.Mesh(armGeo, armMat); armR.position.set(0.45, 0.2, 0);
            torso.add(armL, armR);

            // Bouquet
            bouquet = new THREE.Group();
            const bMat = new THREE.MeshStandardMaterial({color: 0xff0000});
            for(let i=0; i<8; i++) {
                const f = new THREE.Mesh(new THREE.SphereGeometry(0.08), bMat);
                f.position.set(Math.random()*0.2-0.1, Math.random()*0.1, Math.random()*0.2-0.1);
                bouquet.add(f);
            }
            bouquet.position.set(0, -0.3, 0.4);
            bouquet.visible = false;
            armR.add(bouquet);

            // 4. Legs System
            const thighGeo = new THREE.CapsuleGeometry(0.12, 0.4, 4, 8);
            const legMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            
            // Left Leg
            thighL = new THREE.Group();
            const tLM = new THREE.Mesh(thighGeo, legMat); tLM.position.y = -0.2;
            thighL.add(tLM); thighL.position.set(-0.2, 1.1, 0);
            bodyGroup.add(thighL);

            shinL = new THREE.Group();
            const sLM = new THREE.Mesh(thighGeo, legMat); sLM.position.y = -0.2;
            shinL.add(sLM); shinL.position.y = -0.4;
            thighL.add(shinL);

            // Right Leg
            thighR = new THREE.Group();
            const tRM = new THREE.Mesh(thighGeo, legMat); tRM.position.y = -0.2;
            thighR.add(tRM); thighR.position.set(0.2, 1.1, 0);
            bodyGroup.add(thighR);

            shinR = new THREE.Group();
            const sRM = new THREE.Mesh(thighGeo, legMat); sRM.position.y = -0.2;
            shinR.add(sRM); shinR.position.y = -0.4;
            thighR.add(shinR);

            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            let t = clock.getElapsedTime();

            // ANIMATION TIMELINE
            if (t < 3) {
                bodyGroup.position.y = Math.sin(t * 2) * 0.02;
            } else if (t < 8) {
                // THE KNEEL
                let p = Math.min((t - 3) / 5, 1);
                torso.position.y = 1.6 - (p * 0.7);
                thighL.position.y = 1.1 - (p * 0.7);
                thighR.position.y = 1.1 - (p * 0.7);
                
                thighL.rotation.x = -p * 1.4;
                thighR.rotation.x = -p * 1.4;
                shinL.rotation.x = p * 2.2;
                shinR.rotation.x = p * 2.2;
            } else if (t < 11) {
                // THE BOW
                let p = Math.min((t - 8) / 3, 1);
                head.rotation.x = p * 0.8;
                torso.rotation.x = p * 0.3;
            } else {
                // FLOWERS
                let p = Math.min((t - 11) / 2, 1);
                armR.rotation.x = -p * 1.4;
                armL.rotation.x = -p * 1.4;
                bouquet.visible = true;
                document.getElementById('ui').classList.add('show-ui');
            }

            renderer.render(scene, camera);
        }

        function dodge() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function accept() {
            document.body.innerHTML = `
                <div class="flex flex-col items-center justify-center h-screen bg-rose-500 text-white transition-all">
                    <h1 class="text-6xl font-bold animate-bounce">💖</h1>
                    <h2 class="text-4xl font-bold mt-4">Thank You!</h2>
                    <p class="mt-2 opacity-80">I promise to do better.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
